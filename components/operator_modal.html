<!-- Buy Modal (Enriched) -->
<div class="modal-overlay" id="buyModal">
    <div class="modal modal-enriched">
        <div class="modal-header">
            <div class="modal-header-left modal-seller-header">
                <div class="logo-container-wrapper">
                    <div class="seller-avatar" id="modalAvatar">A</div>
                </div>
                <div class="seller-info">
                    <span class="seller-name" id="modalSellerName">---</span>
                    <span class="seller-stats" id="modalSellerStats">ANS: 000000 | Ativa</span>
                </div>
            </div>
            <div class="modal-header-right">
                <button class="favorite-btn" id="favoriteBtn" aria-label="Toggle Favorite" title="Add to Watchlist">
                    <svg class="star-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        width="20" height="20">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    <svg class="star-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
                        stroke-width="2" width="20" height="20">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </button>
                <button class="modal-close" id="modalClose" aria-label="Close Modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Modal Tabs -->
        <div class="modal-tabs" id="modalTabs">
            <button class="modal-tab active" data-tab="details">Detalhes</button>
            <button class="modal-tab" data-tab="Demografia">Demografia</button>
            <button class="modal-tab" data-tab="rn518">Indicadores RN518</button>
            <button class="modal-tab" data-tab="cbr">Indicadores CBR</button>
        </div>

        <!-- Tab: Details -->
        <div class="modal-body modal-tab-content active" id="details" data-tab="details">
            <div class="modal-detail">
                <span class="detail-label">CNPJ</span>
                <span class="detail-value" id="modalPrice">00.000.000/0001-00</span>
            </div>
            <div class="modal-detail">
                <span class="detail-label">Modalidade</span>
                <span class="detail-value" id="modalAvailable">Modalidade</span>
            </div>
            <div class="modal-detail">
                <span class="detail-label">Localização</span>
                <span class="detail-value" id="modalLimit">Cidade - UF</span>
            </div>
            <div class="modal-detail">
                <span class="detail-label">Website</span>
                <span class="detail-value" id="modalPayment">www.exemplo.com.br</span>
            </div>

            <div class="modal-disclaimer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                </svg>
                <span>Informações extraídas do FTP dos Dados Abertos da ANS</span>
            </div>
        </div>

        <!-- Tab: Demografia -->
        <div class="modal-body modal-tab-content" id="Demografia" data-tab="Demografia">
            <div class="demo-metrics-grid" id="demoMetrics"></div>
            <div class="demo-chart-section">
                <div class="demo-chart-header">
                    <span class="demo-chart-title">Evolução de Beneficiários Ativos</span>
                </div>
                <div class="demo-chart-container" id="demoChartContainer"></div>
                <p class="demo-chart-desc" id="demoChartDesc"></p>
            </div>
        </div>

        <!-- Tab: RN 518 -->
        <div class="modal-body modal-tab-content" id="rn518" data-tab="rn518">
            <div class="rating-breakdown" id="rn518Breakdown"></div>
        </div>

        <!-- Tab: CBR -->
        <div class="modal-body modal-tab-content" id="cbr" data-tab="cbr">
            <div class="rating-breakdown" id="cbrBreakdown"></div>
        </div>

        <div class="modal-footer"
            style="display: flex; gap: 12px; justify-content: flex-end; padding: 16px 24px; border-top: 1px solid var(--border-light);">
            <button class="modal-btn-deep" id="btnDeepHistory">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
                Análise Profunda
            </button>
            <button class="modal-confirm" id="modalConfirm">Fechar</button>
        </div>
    </div>
</div>
