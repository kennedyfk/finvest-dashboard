<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando... — Portal ANS</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
  <style>
    .callback-screen {
      text-align: center;
      padding: 24px 0;
    }
    .callback-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">FD</div>
        <div class="auth-logo-text">
          <span class="auth-logo-name">Finvest Dashboard</span>
          <span class="auth-logo-sub">Portal ANS</span>
        </div>
      </div>

      <div class="callback-screen" id="loadingScreen">
        <div class="callback-spinner"></div>
        <h2 class="auth-title">Autenticando...</h2>
        <p class="auth-subtitle">Aguarde enquanto finalizamos seu acesso.</p>
      </div>

      <div id="errorScreen" style="display:none">
        <div class="success-icon" style="background:#fef2f2">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
          </svg>
        </div>
        <h2 class="auth-title" style="color:var(--danger)">Erro na autenticação</h2>
        <p class="auth-subtitle" id="errorMsg">Ocorreu um problema. Tente novamente.</p>
        <a href="login.html" class="btn-auth" style="text-decoration:none;margin-top:8px">
          Voltar para o login
        </a>
      </div>
    </div>
  </div>

  <script src="../js/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const { supabase: sb } = AuthModule;

    (async () => {
      try {
        // O Supabase SDK troca automaticamente o code/hash por uma sessão
        const { data, error } = await sb.auth.getSession();

        if (error) throw error;

        if (data.session) {
          // Verifica o tipo de callback
          const hash = new URLSearchParams(window.location.hash.substring(1));
          const type = hash.get('type');

          if (type === 'recovery') {
            // Redefinição de senha → vai para reset
            window.location.replace('reset-password.html');
          } else {
            // Login/cadastro → vai para dashboard
            window.location.replace('../index.html');
          }
        } else {
          // Sem sessão após callback — pode ser confirmação de email
          // O Supabase envia o usuário de volta, já confirmado
          window.location.replace('login.html?confirmed=1');
        }

      } catch (err) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'block';
        const msg = err.message || 'Erro desconhecido';
        document.getElementById('errorMsg').textContent =
          msg.includes('expired') ? 'O link expirou. Solicite um novo.' :
          msg.includes('invalid') ? 'Link inválido. Solicite um novo.' :
          'Ocorreu um problema. Tente novamente.';
      }
    })();
  </script>
</body>
</html>
