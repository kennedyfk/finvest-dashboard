<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Operadora Saúde — ANS</title>
    <meta name="description"
        content="Portal de Informações de Operadoras de Planos de Saúde — Consulta de dados cadastrais e status na ANS.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=13">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar (loaded from components/sidebar.html) -->
        <div id="sidebarContainer"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Navigation">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"
                            height="22">
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <span class="breadcrumb">Painel Geral</span>
                </div>
                <div class="top-bar-right">
                    <div class="search-box" id="searchBox">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" placeholder="Search" id="searchInput">
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode"
                        aria-label="Toggle Dark Mode">
                        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </svg>
                    </button>
                    <button class="notification-btn" id="notifBtn" aria-label="Notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"
                            height="20">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge">3</span>
                    </button>
                </div>
            </header>

            <!-- Operadoras de Saúde Trade Content -->
            <div class="content-wrapper">
                <div class="page-header">
                    <h1>Operadoras de Saúde</h1>
                    <div class="header-filters">
                        <!-- Favorites Toggle & Clear -->
                        <!-- Favorites Toggle & Clear -->
                        <div class="fav-actions" style="display: flex; gap: 4px;">
                            <button class="filter-btn fav-filter-btn" id="favFilterBtn"
                                title="Mostrar apenas favoritos">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <polygon
                                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                                </svg>
                                <span>Favoritos <span class="fav-count"></span></span>
                            </button>
                            <button class="filter-btn fav-clear-btn" id="favClearBtn" title="Limpar todos os favoritos"
                                style="padding: 0 8px; color: var(--text-muted); display: flex; align-items: center; justify-content: center;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>

                        <!-- Column Selector -->
                        <div class="columns-wrapper" id="columnsWrapper">
                            <button class="filter-btn" id="columnsBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <rect x="3" y="3" width="7" height="7" rx="1" />
                                    <rect x="14" y="3" width="7" height="7" rx="1" />
                                    <rect x="3" y="14" width="7" height="7" rx="1" />
                                    <rect x="14" y="14" width="7" height="7" rx="1" />
                                </svg>
                                <span>Colunas</span>
                                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" width="12" height="12">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </button>
                            <div class="columns-dropdown" id="columnsDropdown">
                                <div class="columns-dropdown-header">
                                    <span>Dados de Beneficiários</span>
                                    <button class="columns-clear-btn" id="columnsClearBtn">Limpar</button>
                                </div>
                                <div class="columns-dropdown-list">
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="qt_beneficiario_ativo" checked> Beneficiários Ativos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="qt_beneficiario_aderido"> Beneficiários Aderidos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="qt_beneficiario_cancelado"> Beneficiários Cancelados</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="qt_beneficiario_saldo"> Saldo Beneficiários</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="ativos_ate_4_anos_perc"> % Ativos até 4 anos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="ativos_ate_14_anos_perc"> % Ativos até 14 anos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="ativos_idosos_perc"> % Ativos Idosos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="razao_dependencia_de_idosos"> Razão Dep. Idosos</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="razao_dependencia_de_jovens"> Razão Dep. Jovens</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="indice_de_envelhecimento"> Índice Envelhecimento</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="indice_de_longevidade"> Índice Longevidade</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="razao_sexo_terceira_idade"> Razão Sexo 3ª Idade</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="razao_renovacao_geracional"> Razão Renov. Geracional</label>
                                    <label class="columns-checkbox-item"><input type="checkbox"
                                            value="idosos_plano_individual"> % Idosos Plano Individual</label>
                                </div>
                            </div>
                        </div>

                        <button class="filter-btn" id="filterBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                height="16">
                                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                            </svg>
                            <span>Filter</span>
                        </button>
                        <div class="export-wrapper" id="exportWrapper">
                            <button class="export-btn" id="exportBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                <span>Export</span>
                                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" width="12" height="12">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </button>
                            <div class="export-dropdown" id="exportDropdown">
                                <button class="export-option" id="exportCSV">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        width="16" height="16">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                        <polyline points="14 2 14 8 20 8" />
                                        <line x1="16" y1="13" x2="8" y2="13" />
                                        <line x1="16" y1="17" x2="8" y2="17" />
                                    </svg>
                                    <div class="export-option-info">
                                        <span class="export-option-name">Export CSV</span>
                                        <span class="export-option-desc">Spreadsheet format</span>
                                    </div>
                                </button>
                                <button class="export-option" id="exportExcel">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        width="16" height="16">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                        <polyline points="14 2 14 8 20 8" />
                                        <path d="M8 13h2v4H8z" />
                                        <path d="M14 13h2v4h-2z" />
                                        <path d="M10 15h4" />
                                    </svg>
                                    <div class="export-option-info">
                                        <span class="export-option-name">Export Excel</span>
                                        <span class="export-option-desc">Native .xlsx format</span>
                                    </div>
                                </button>
                                <button class="export-option" id="exportPDF">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        width="16" height="16">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                        <polyline points="14 2 14 8 20 8" />
                                        <line x1="9" y1="15" x2="15" y2="15" />
                                    </svg>
                                    <div class="export-option-info">
                                        <span class="export-option-name">Export PDF</span>
                                        <span class="export-option-desc">Printable report</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="kpi-cards" id="kpiCards">
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-icon-traders">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"
                                height="22">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg>
                        </div>
                        <div class="kpi-info">
                            <span class="kpi-value" id="kpiTraders">0</span>
                            <span class="kpi-label">Operadoras Ativas</span>
                        </div>
                        <div class="kpi-trend up" id="kpiTradersTrend">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"
                                height="14">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            </svg>
                            <span>+12%</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-icon-price">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"
                                height="22">
                                <line x1="12" y1="1" x2="12" y2="23" />
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg>
                        </div>
                        <div class="kpi-info">
                            <span class="kpi-value" id="kpiAvgPrice">$0</span>
                            <span class="kpi-label">Modalidades</span>
                        </div>
                        <div class="kpi-trend neutral" id="kpiPriceTrend">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"
                                height="14">
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            <span>Stable</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-icon-rate">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"
                                height="22">
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                            </svg>
                        </div>
                        <div class="kpi-info">
                            <span class="kpi-value" id="kpiAvgRate">0%</span>
                            <span class="kpi-label">% Ativas</span>
                        </div>
                        <div class="kpi-trend up" id="kpiRateTrend">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"
                                height="14">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            </svg>
                            <span>+2.3%</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-icon-orders">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"
                                height="22">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                            </svg>
                        </div>
                        <div class="kpi-info">
                            <span class="kpi-value" id="kpiTotalOrders">0</span>
                            <span class="kpi-label">Total Beneficiários</span>
                        </div>
                        <div class="kpi-trend up" id="kpiOrdersTrend">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"
                                height="14">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            </svg>
                            <span>+8.5%</span>
                        </div>
                    </div>
                </div>

                <!-- Modality Tabs -->
                <div class="crypto-tabs" id="cryptoTabs">

                    <button class="crypto-tab active" data-modalidade="all">
                        <div class="crypto-tab-icon" style="background: linear-gradient(135deg, #64748b, #334155);">
                            <span>★</span>
                        </div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Todas</span>
                        </div>
                    </button>
                    <button class="crypto-tab" data-modalidade="Medicina de Grupo">
                        <div class="crypto-tab-icon med"><span>✚</span></div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Medicina de Grupo</span>
                        </div>
                    </button>
                    <button class="crypto-tab" data-modalidade="Autogestão">
                        <div class="crypto-tab-icon aut"><span>🏠</span></div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Autogestão</span>
                        </div>
                    </button>
                    <button class="crypto-tab" data-modalidade="Seguradora Especializada em Saúde">
                        <div class="crypto-tab-icon adm"><span>📋</span></div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Seguradora</span>
                        </div>
                    </button>
                    <button class="crypto-tab" data-modalidade="Cooperativa Médica">
                        <div class="crypto-tab-icon coo"><span>🤝</span></div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Cooperativa</span>
                        </div>
                    </button>
                    <button class="crypto-tab" data-modalidade="Filantropia">
                        <div class="crypto-tab-icon fil"><span>♥</span></div>
                        <div class="crypto-tab-info">
                            <span class="crypto-tab-name">Filantropia</span>
                        </div>
                    </button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="trade-table" id="tradeTable">
                        <thead>
                            <tr>
                                <th class="col-advertiser sortable" data-sort="Razao_Social">Operadora <span
                                        class="sort-icon"></span></th>
                                <th class="col-payment sortable" data-sort="Modalidade">Modalidade <span
                                        class="sort-icon"></span></th>
                                <th class="col-limit sortable" data-sort="Cidade">Cidade / UF <span
                                        class="sort-icon"></span></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows populated by JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <div class="pagination-left">
                        <span>Show rows per page</span>
                        <div class="rows-select" id="rowsSelect">
                            <div class="select-trigger">
                                <span id="rowsValue">8</span>
                                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" width="14" height="14">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </div>
                            <div class="select-dropdown rows-dropdown">
                                <div class="select-option" data-value="5">5</div>
                                <div class="select-option active" data-value="8">8</div>
                                <div class="select-option" data-value="10">10</div>
                                <div class="select-option" data-value="15">15</div>
                                <div class="select-option" data-value="20">20</div>
                            </div>
                        </div>
                    </div>
                    <div class="pagination-right">
                        <span id="paginationInfo">1-8 of 5</span>
                        <div class="pagination-controls">
                            <button class="page-btn" id="prevPage" aria-label="Previous Page" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <polyline points="15 18 9 12 15 6" />
                                </svg>
                            </button>
                            <button class="page-btn" id="nextPage" aria-label="Next Page">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <polyline points="9 18 15 12 9 6" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Filter Modal (Advanced) -->
    <div class="modal-overlay" id="filterModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Filtros Avançados</h2>
                <button class="modal-close" id="filterModalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="filter-form-group">
                    <label for="filterStatus">Status da Operadora</label>
                    <select id="filterStatus" class="filter-select">
                        <option value="all">Todos Status</option>
                        <option value="ATIVA">Ativa</option>
                        <option value="CANCELADA">Cancelada</option>
                    </select>
                </div>
                <div class="filter-form-group">
                    <label>Modalidade</label>
                    <div class="filter-dropdown-wrapper" id="filterModalityWrapper">
                        <button type="button" class="filter-dropdown-trigger" id="filterModalityTrigger">
                            <span class="filter-dropdown-text">Todas as Modalidades</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                width="14" height="14">
                                <polyline points="6 9 12 15 18 9" />
                            </svg>
                        </button>
                        <div class="filter-checkbox-list" id="filterModalityList">
                            <div class="filter-search-container">
                                <div class="filter-search-wrapper">
                                    <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <input type="text" placeholder="Buscar modalidade..." class="filter-search-input" id="searchModality">
                                </div>
                            </div>
                            <label class="filter-checkbox-item"><input type="checkbox" value="Medicina de Grupo">
                                Medicina de Grupo</label>
                            <label class="filter-checkbox-item"><input type="checkbox" value="Autogestão">
                                Autogestão</label>
                            <label class="filter-checkbox-item"><input type="checkbox" value="Cooperativa Médica">
                                Cooperativa Médica</label>
                            <label class="filter-checkbox-item"><input type="checkbox"
                                    value="Seguradora Especializada em Saúde"> Seguradora Especializada em Saúde</label>
                            <label class="filter-checkbox-item"><input type="checkbox" value="Filantropia">
                                Filantropia</label>
                        </div>
                    </div>
                </div>
                <div class="filter-form-group">
                    <label>Estado (UF)</label>
                    <div class="filter-dropdown-wrapper" id="filterUFWrapper">
                        <button type="button" class="filter-dropdown-trigger" id="filterUFTrigger">
                            <span class="filter-dropdown-text">Todos os Estados</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                width="14" height="14">
                                <polyline points="6 9 12 15 18 9" />
                            </svg>
                        </button>
                        <div class="filter-checkbox-list filter-checkbox-list-tall" id="filterUFList">
                            <div class="filter-search-container">
                                <div class="filter-search-wrapper">
                                    <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <input type="text" placeholder="Buscar estado..." class="filter-search-input" id="searchUF">
                                </div>
                            </div>
