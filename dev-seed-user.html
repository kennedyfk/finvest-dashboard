<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Criar usuário de teste</title>
  <style>
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 32px; max-width: 420px; width: 100%; }
    h2 { margin: 0 0 20px; color: #f74b4b; font-size: 1rem; text-transform: uppercase; letter-spacing: .08em; }
    .field { margin-bottom: 12px; font-size: .85rem; color: #aaa; }
    .field span { color: #fff; }
    button { width: 100%; padding: 12px; background: #f74b4b; color: #fff; border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:disabled { opacity: .5; cursor: default; }
    .log { margin-top: 20px; padding: 12px; background: #0f0f0f; border-radius: 6px; font-size: .8rem; min-height: 60px; white-space: pre-wrap; color: #aaa; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
  </style>
</head>
<body>
<div class="box">
  <h2>Seed — Usuário de Teste</h2>
  <div class="field">E-mail: <span>teste@teste.com</span></div>
  <div class="field">Senha:  <span>teste123</span></div>
  <div class="field">Role:   <span>FREE</span></div>
  <button id="btn">Criar usuário</button>
  <div class="log" id="log">Aguardando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/env.js"></script>
<script>
  const { createClient } = window.supabase;
  const sb = createClient(window.__ENV.SUPABASE_URL, window.__ENV.SUPABASE_ANON_KEY);

  const log = document.getElementById('log');
  const btn = document.getElementById('btn');

  function write(msg, cls = '') {
    log.textContent = msg;
    log.className = 'log ' + cls;
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    write('Criando conta…');

    const { data, error } = await sb.auth.signUp({
      email: 'teste@teste.com',
      password: 'teste123',
      options: { data: { full_name: 'Usuário Teste' } }
    });

    if (error) {
      if (error.message.toLowerCase().includes('already registered')) {
        write('✓ Usuário já existe. Use as credenciais abaixo para entrar.', 'ok');
      } else {
        write('✗ Erro: ' + error.message, 'err');
        btn.disabled = false;
      }
      return;
    }

    if (data.user && !data.session) {
      write('✓ Conta criada! Verifique o e-mail para confirmar (ou desative "Email confirmations" no Supabase dashboard).', 'ok');
    } else {
      write('✓ Conta criada e sessão ativa!\n\nE-mail: teste@teste.com\nSenha:  teste123', 'ok');
    }
  });
</script>
</body>
</html>
