<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — SaúdePortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f5f8; --card-bg: #fff; --text: #222638;
            --text-secondary: #6b7280; --text-muted: #9ca3af;
            --border: #e2e4eb; --primary: #f74b4b;
            --font: 'Inter', -apple-system, sans-serif;
            --radius: 12px;
        }
        [data-theme="dark"] {
            --bg: #151824; --card-bg: #202434; --text: #e2e8f0;
            --text-secondary: #94a3b8; --text-muted: #64748b; --border: #333a52;
        }

        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 32px 16px;
            transition: background .2s, color .2s;
        }

        .logo {
            display: flex; align-items: center; gap: 10px; margin-bottom: 48px;
        }
        .logo-icon {
            width: 36px; height: 36px; background: var(--primary); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 800; color: #fff;
        }
        .logo-name { font-size: 1rem; font-weight: 700; color: var(--text); }

        .error-number {
            font-size: clamp(5rem, 20vw, 9rem); font-weight: 800;
            color: var(--primary); line-height: 1; letter-spacing: -4px;
            animation: bounce-in .6s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes bounce-in {
            0%   { transform: scale(.4); opacity: 0; }
            60%  { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        .error-title {
            font-size: 1.4rem; font-weight: 700; color: var(--text);
            margin: 16px 0 10px; text-align: center;
        }
        .error-desc {
            font-size: 0.9rem; color: var(--text-secondary); text-align: center;
            max-width: 400px; line-height: 1.6; margin-bottom: 36px;
        }

        .error-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 11px 22px; background: var(--primary); color: #fff;
            border-radius: var(--radius); font-size: 0.88rem; font-weight: 600;
            text-decoration: none; transition: background .2s;
        }
        .btn-primary:hover { background: #d93c3c; }
        .btn-secondary {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 11px 22px; background: var(--card-bg); color: var(--text-secondary);
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 0.88rem; font-weight: 500; text-decoration: none; transition: all .2s;
        }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

        .theme-btn {
            position: fixed; top: 20px; right: 20px;
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--card-bg); cursor: pointer; display: flex;
            align-items: center; justify-content: center; color: var(--text-secondary);
            transition: all .2s;
        }
        .theme-btn:hover { color: var(--text); }
        .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun  { display: block; }
    </style>
</head>
<body>
    <button class="theme-btn" id="themeToggle" title="Alternar tema" aria-label="Alternar tema">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>

    <div class="logo">
        <div class="logo-icon">FD</div>
        <span class="logo-name">SaúdePortal</span>
    </div>

    <div class="error-number">404</div>
    <div class="error-title">Página não encontrada</div>
    <p class="error-desc">A página que você está procurando não existe ou foi movida. Verifique o endereço ou volte ao painel.</p>

    <div class="error-actions">
        <a href="index.html" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Ir ao painel
        </a>
        <a href="help.html" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Central de Ajuda
        </a>
    </div>

    <script>
        (function () {
            const saved = localStorage.getItem('finvest-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
        document.getElementById('themeToggle').addEventListener('click', function () {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('finvest-theme', isDark ? 'light' : 'dark');
        });
    </script>
</body>
</html>
